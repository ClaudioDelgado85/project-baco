<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — Panel de tienda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }
        .auth-logo p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }
        .auth-error {
            background: #fef2f2;
            color: #dc2626;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #fecaca;
        }
        .auth-error.show { display: block; }
        .field-error {
            color: #dc2626;
            font-size: 12px;
            font-weight: 500;
            margin-top: 4px;
            display: none;
        }
        .field-error.show { display: block; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #111827;
            background: #fff;
        }
        .form-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-group input.error {
            border-color: #dc2626;
        }
        .hint {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 4px;
        }
        .submit-btn:hover { background: #1d4ed8; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled {
            background: #93c5fd;
            cursor: not-allowed;
            transform: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6b7280;
        }
        .auth-footer a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        /* Mobile-First: base is mobile */
        body { padding: 12px; }
        .auth-card { padding: 24px 16px; }
        .auth-logo h1 { font-size: 20px; }
        .auth-logo p { font-size: 13px; }
        .form-group input { padding: 10px 12px; font-size: 14px; }
        .submit-btn { padding: 12px; font-size: 14px; }

        @media (min-width: 480px) {
            body { padding: 20px; }
            .auth-card { padding: 40px; }
            .auth-logo h1 { font-size: 24px; }
            .auth-logo p { font-size: 14px; }
            .form-group input { padding: 12px 14px; font-size: 15px; }
            .submit-btn { padding: 14px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Crear tu tienda</h1>
            <p>Registrate para gestionar tu negocio</p>
        </div>

        <div class="auth-error" id="authError"></div>

        <form id="signupForm" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" autocomplete="email" required>
                <div class="field-error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" minlength="6" required>
                <div class="field-error" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="slug">Slug de tu tienda</label>
                <input type="text" id="slug" name="slug" placeholder="mi-tienda" autocomplete="off" pattern="^[a-zA-Z0-9][a-zA-Z0-9-]{2,49}$" required>
                <div class="hint">Ej: mi-tienda — solo letras, números y guiones (3-50 caracteres)</div>
                <div class="field-error" id="slugError"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Crear cuenta</button>
        </form>

        <div class="auth-footer">
            ¿Ya tenés cuenta? <a href="/login">Iniciá sesión</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        (async function checkSession() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    window.location.href = '/dashboard';
                }
            } catch (_) { /* no session — show form */ }
        })();

        function clearFieldErrors() {
            document.querySelectorAll('.field-error').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('.form-group input').forEach(el => {
                el.classList.remove('error');
            });
            document.getElementById('authError').classList.remove('show');
        }

        function showFieldError(inputId, errorId, message) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);
            if (input) input.classList.add('error');
            if (error) {
                error.textContent = message;
                error.classList.add('show');
            }
        }

        function showAuthError(message) {
            const el = document.getElementById('authError');
            el.textContent = message;
            el.classList.add('show');
        }

        function validateForm() {
            clearFieldErrors();
            let isValid = true;

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const slug = document.getElementById('slug').value.trim();

            // Email validation
            if (!email) {
                showFieldError('email', 'emailError', 'El email es obligatorio');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showFieldError('email', 'emailError', 'Formato de email inválido');
                isValid = false;
            }

            // Password validation
            if (!password) {
                showFieldError('password', 'passwordError', 'La contraseña es obligatoria');
                isValid = false;
            } else if (password.length < 6) {
                showFieldError('password', 'passwordError', 'Mínimo 6 caracteres');
                isValid = false;
            }

            // Slug validation
            if (!slug) {
                showFieldError('slug', 'slugError', 'El slug es obligatorio');
                isValid = false;
            } else if (slug.length < 3 || slug.length > 50) {
                showFieldError('slug', 'slugError', 'El slug debe tener entre 3 y 50 caracteres');
                isValid = false;
            } else if (!/^[a-zA-Z0-9][a-zA-Z0-9-]*[a-zA-Z0-9]$/.test(slug) && slug.length > 1) {
                showFieldError('slug', 'slugError', 'Solo letras, números y guiones');
                isValid = false;
            } else if (!/^[a-zA-Z0-9-]+$/.test(slug)) {
                showFieldError('slug', 'slugError', 'Solo letras, números y guiones');
                isValid = false;
            }

            return isValid;
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validateForm()) return;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const slug = document.getElementById('slug').value.trim().toLowerCase();

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, slug })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    showAuthError(data.error || 'Error al crear la cuenta');
                    btn.disabled = false;
                    btn.textContent = 'Crear cuenta';
                }
            } catch (err) {
                showAuthError('Error de conexión. Intentalo de nuevo.');
                btn.disabled = false;
                btn.textContent = 'Crear cuenta';
            }
        });
    </script>
</body>
</html>
