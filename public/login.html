<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Panel de tienda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }
        .auth-logo p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }
        .auth-error {
            background: #fef2f2;
            color: #dc2626;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #fecaca;
        }
        .auth-error.show { display: block; }
        .field-error {
            color: #dc2626;
            font-size: 12px;
            font-weight: 500;
            margin-top: 4px;
            display: none;
        }
        .field-error.show { display: block; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #111827;
            background: #fff;
        }
        .form-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-group input.error {
            border-color: #dc2626;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .submit-btn:hover { background: #1d4ed8; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled {
            background: #93c5fd;
            cursor: not-allowed;
            transform: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6b7280;
        }
        .auth-footer a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .password-toggle {
            position: relative;
        }
        .toggle-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 14px;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
        }
        .toggle-btn:hover { color: #6b7280; }
        /* Mobile-First: base is mobile */
        body { padding: 12px; }
        .auth-card { padding: 24px 16px; }
        .auth-logo h1 { font-size: 20px; }
        .auth-logo p { font-size: 13px; }
        .form-group input { padding: 10px 12px; font-size: 14px; }
        .submit-btn { padding: 12px; font-size: 14px; }

        @media (min-width: 480px) {
            body { padding: 20px; }
            .auth-card { padding: 40px; }
            .auth-logo h1 { font-size: 24px; }
            .auth-logo p { font-size: 14px; }
            .form-group input { padding: 12px 14px; font-size: 15px; }
            .submit-btn { padding: 14px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Panel de tienda</h1>
            <p>Iniciá sesión para gestionar tu negocio</p>
        </div>

        <div class="auth-error" id="authError"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" autocomplete="email" required>
                <div class="field-error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-toggle">
                    <input type="password" id="password" name="password" placeholder="••••••" autocomplete="current-password" minlength="6" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword()" tabindex="-1" aria-label="Mostrar contraseña">Mostrar</button>
                </div>
                <div class="field-error" id="passwordError"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Iniciar sesión</button>
        </form>

        <div class="auth-footer">
            ¿No tenés cuenta? <a href="/signup">Registrate</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        (async function checkSession() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    window.location.href = '/dashboard';
                }
            } catch (_) { /* no session — show form */ }
        })();

        function togglePassword() {
            const input = document.getElementById('password');
            const btn = event.currentTarget;
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'Ocultar';
            } else {
                input.type = 'password';
                btn.textContent = 'Mostrar';
            }
        }

        function clearFieldErrors() {
            document.querySelectorAll('.field-error').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('.form-group input').forEach(el => {
                el.classList.remove('error');
            });
            document.getElementById('authError').classList.remove('show');
        }

        function showFieldError(inputId, errorId, message) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);
            if (input) input.classList.add('error');
            if (error) {
                error.textContent = message;
                error.classList.add('show');
            }
        }

        function showAuthError(message) {
            const el = document.getElementById('authError');
            el.textContent = message;
            el.classList.add('show');
        }

        function validateForm() {
            clearFieldErrors();
            let isValid = true;

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email) {
                showFieldError('email', 'emailError', 'El email es obligatorio');
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showFieldError('email', 'emailError', 'Formato de email inválido');
                isValid = false;
            }

            if (!password) {
                showFieldError('password', 'passwordError', 'La contraseña es obligatoria');
                isValid = false;
            } else if (password.length < 6) {
                showFieldError('password', 'passwordError', 'Mínimo 6 caracteres');
                isValid = false;
            }

            return isValid;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validateForm()) return;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    showAuthError(data.error || 'Email o contraseña incorrectos');
                    btn.disabled = false;
                    btn.textContent = 'Iniciar sesión';
                }
            } catch (err) {
                showAuthError('Error de conexión. Intentalo de nuevo.');
                btn.disabled = false;
                btn.textContent = 'Iniciar sesión';
            }
        });
    </script>
</body>
</html>
